<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Trust Center</title>
<style>
  :root{color-scheme:dark}
  body{margin:0;background:#0b0d18;color:#e7ebf3;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
  .tp{max-width:880px;margin:0 auto;padding:48px 20px 80px}
  .badge{display:inline-block;font-size:11px;letter-spacing:.5px;text-transform:uppercase;color:#22c55e;border:1px solid #14532d;background:#0f1f15;border-radius:20px;padding:4px 12px;margin-bottom:18px}
  h1{font-size:30px;margin:0 0 6px}
  .intro{color:#94a3b8;font-size:15px;line-height:1.55;max-width:680px;margin:0 0 28px}
  .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:30px}
  .stat{background:#13162a;border:1px solid #2d3250;border-radius:12px;padding:18px}
  .stat .v{font-size:30px;font-weight:800}.stat .l{font-size:12px;color:#94a3b8;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
  h2{font-size:16px;margin:30px 0 12px;color:#cbd5e1}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{background:#13162a;border:1px solid #2d3250;border-radius:8px;padding:8px 13px;font-size:13px}
  .chip b{color:#34d399}.chip .ip{color:#fbbf24}
  table{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #1e2133}th{color:#94a3b8;font-size:11px;text-transform:uppercase;letter-spacing:.4px}
  .foot{margin-top:40px;color:#64748b;font-size:12px;border-top:1px solid #1e2133;padding-top:16px}
  .foot a{color:#7c83fd}
  .powered{margin-top:8px;font-size:11px;color:#475569}
  .err{text-align:center;padding:80px 20px;color:#94a3b8}
</style>
</head>
<body>
<div class="tp" id="tp"><div class="err">Loading…</div></div>
<script src="/js/i18n.js"></script><script src="/js/trust-public.js"></script>
</body>
</html>
