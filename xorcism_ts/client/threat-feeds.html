<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>XORCISM — Threat Feeds (CTI)</title>
<link rel="stylesheet" href="/css/style.css">
<style>
  .tf-layout{display:flex;gap:16px;padding:16px;align-items:flex-start}
  .tf-side{flex:0 0 300px;display:flex;flex-direction:column;gap:8px;min-width:0;max-height:calc(100vh - 110px);overflow:auto}
  .tf-main{flex:1;min-width:0}
  .tf-feed{display:flex;align-items:center;gap:9px;padding:9px 11px;border:1px solid #2d3250;border-radius:9px;cursor:pointer;background:#13162a}
  .tf-feed:hover{border-color:#fb923c}
  .tf-feed.sel{border-color:#fb923c;background:#1a1d2e}
  .tf-feed .nm{font-size:13px;color:#e2e8f0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tf-feed .meta{font-size:10px;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .tf-feed .dot{width:8px;height:8px;border-radius:50%;background:#fb923c;flex:0 0 auto}
  .tf-feed.all{background:linear-gradient(120deg,#1a1d2e,#13162a);border-color:#3b4060}
  .tf-feed.all .dot{background:#22d3ee}
  .tf-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .tf-head h2{margin:0;font-size:17px;color:#e2e8f0}
  .tf-head .src{font-size:12px;color:#64748b}
  .tf-news{display:flex;flex-direction:column;gap:10px}
  .tf-art{background:#13162a;border:1px solid #2d3250;border-radius:10px;padding:13px 15px;transition:border-color .15s}
  .tf-art:hover{border-color:#3b4060}
  .tf-art a.ttl{font-size:15px;color:#e2e8f0;font-weight:600;text-decoration:none;line-height:1.35}
  .tf-art a.ttl:hover{color:#fb923c}
  .tf-art .sub{font-size:11px;color:#64748b;margin:5px 0 0;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
  .tf-art .sub .so{color:#7c83fd;font-weight:600}
  .tf-art .sum{font-size:13px;color:#94a3b8;margin:7px 0 0;line-height:1.5}
  .tf-status{color:#64748b;font-size:13px;padding:30px 0;text-align:center}
  .badge{font-size:9px;border-radius:10px;padding:1px 7px;background:#1e2440;color:#94a3b8;flex:0 0 auto}
  .btn-sm2{background:#1e2440;border:1px solid #2d3250;color:#cbd5e1;border-radius:6px;font-size:12px;padding:5px 11px;cursor:pointer}
  .btn-sm2:hover{border-color:#fb923c}
  .tf-sidehead{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.5px;margin:6px 2px 2px}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo">&#9670; XORCISM</span>
  <a href="/" data-i18n="nav.explorer">&#8592; Explorateur</a>
  <a href="/threat-feeds" data-i18n="nav.feeds" style="color:#fb923c">&#128225; Threat Feeds</a>
  <a href="/stix-graph" data-i18n="nav.stix">&#128376; STIX Graph</a>
  <a href="/?db=XTHREAT&amp;table=THREATFEED">&#9881;&#65039; Manage feeds</a>
  <span class="spacer"></span>
  <span class="title">Threat Feeds (CTI)</span>
</div>

<div class="tf-layout">
  <div class="tf-side" id="tf-side">
    <div class="tf-status">Chargement des flux…</div>
  </div>
  <div class="tf-main">
    <div class="tf-head">
      <h2 id="tf-title">Dernières actus CTI</h2>
      <span class="src" id="tf-src"></span>
      <span class="spacer"></span>
      <button class="btn-sm2" id="tf-refresh">⟳ Rafraîchir</button>
    </div>
    <div class="tf-news" id="tf-news"><div class="tf-status">…</div></div>
  </div>
</div>

<div id="toast"></div>
<script src="/js/session-ui.js"></script>
<script>
(function () {
  var feeds = [];
  var current = "latest"; // "latest" | feed id
  var newsEl = document.getElementById("tf-news");
  var sideEl = document.getElementById("tf-side");

  function esc(s) { var d = document.createElement("div"); d.textContent = s == null ? "" : String(s); return d.innerHTML; }
  function host(u) { try { return new URL(u).host.replace(/^www\./, ""); } catch (e) { return ""; } }
  function rel(iso) {
    if (!iso) return "";
    var t = Date.parse(iso); if (isNaN(t)) return esc(iso);
    var s = Math.floor((Date.now() - t) / 1000);
    if (s < 60) return "à l'instant";
    if (s < 3600) return Math.floor(s / 60) + " min";
    if (s < 86400) return Math.floor(s / 3600) + " h";
    if (s < 2592000) return Math.floor(s / 86400) + " j";
    return new Date(t).toLocaleDateString();
  }

  function renderSidebar() {
    var html = '<div class="tf-feed all' + (current === "latest" ? " sel" : "") + '" data-id="latest">'
      + '<span class="dot"></span><div style="min-width:0;flex:1"><div class="nm">🔥 Dernières actus (tous les flux)</div>'
      + '<div class="meta">' + feeds.length + ' flux CTI de confiance</div></div></div>';
    html += '<div class="tf-sidehead">Flux</div>';
    feeds.forEach(function (f) {
      html += '<div class="tf-feed' + (String(current) === String(f.id) ? " sel" : "") + '" data-id="' + f.id + '">'
        + '<span class="dot"></span><div style="min-width:0;flex:1">'
        + '<div class="nm">' + esc(f.name) + '</div>'
        + '<div class="meta">' + esc(f.vendor || host(f.url)) + (f.category ? ' · ' + esc(f.category) : '') + '</div></div></div>';
    });
    sideEl.innerHTML = html;
    Array.prototype.forEach.call(sideEl.querySelectorAll(".tf-feed"), function (el) {
      el.onclick = function () { select(el.getAttribute("data-id")); };
    });
  }

  function renderItems(items, withSource) {
    if (!items || !items.length) { newsEl.innerHTML = '<div class="tf-status">Aucun article.</div>'; return; }
    newsEl.innerHTML = items.map(function (it) {
      var sub = [];
      if (withSource && it.source) sub.push('<span class="so">' + esc(it.source) + '</span>');
      if (it.date) sub.push(esc(rel(it.date)));
      if (it.link) sub.push(esc(host(it.link)));
      var titleHtml = it.link
        ? '<a class="ttl" href="' + esc(it.link) + '" target="_blank" rel="noopener noreferrer">' + esc(it.title) + '</a>'
        : '<span class="ttl">' + esc(it.title) + '</span>';
      return '<div class="tf-art">' + titleHtml
        + '<div class="sub">' + sub.join('<span>·</span>') + '</div>'
        + (it.summary ? '<div class="sum">' + esc(it.summary) + '</div>' : '') + '</div>';
    }).join("");
  }

  function select(id) {
    current = id;
    renderSidebar();
    var titleEl = document.getElementById("tf-title");
    var srcEl = document.getElementById("tf-src");
    newsEl.innerHTML = '<div class="tf-status">Récupération des articles…</div>';
    if (id === "latest") {
      titleEl.textContent = "Dernières actus CTI";
      fetch("/api/threatfeeds/latest?limit=50").then(function (r) { return r.json(); }).then(function (d) {
        srcEl.textContent = (d.fetched || 0) + "/" + (d.feeds || 0) + " flux";
        renderItems(d.items, true);
      }).catch(function (e) { newsEl.innerHTML = '<div class="tf-status">⚠️ ' + esc(e) + '</div>'; });
    } else {
      var f = feeds.filter(function (x) { return String(x.id) === String(id); })[0];
      titleEl.textContent = f ? f.name : "Flux";
      srcEl.innerHTML = f && f.site ? '<a href="' + esc(f.site) + '" target="_blank" rel="noopener noreferrer" style="color:#7c83fd">' + esc(host(f.site)) + ' ↗</a>' : "";
      fetch("/api/threatfeeds/items?id=" + encodeURIComponent(id) + "&limit=25").then(function (r) {
        return r.ok ? r.json() : r.json().then(function (j) { throw new Error(j.error || ("Erreur " + r.status)); });
      }).then(function (d) {
        renderItems(d.items, false);
        if (d.stale) srcEl.textContent += " (cache)";
      }).catch(function (e) { newsEl.innerHTML = '<div class="tf-status">⚠️ ' + esc(e.message || e) + '</div>'; });
    }
  }

  document.getElementById("tf-refresh").onclick = function () { select(current); };

  fetch("/api/threatfeeds").then(function (r) { return r.json(); }).then(function (list) {
    feeds = Array.isArray(list) ? list : [];
    renderSidebar();
    select("latest");
  }).catch(function (e) {
    sideEl.innerHTML = '<div class="tf-status">⚠️ Impossible de charger les flux.</div>';
    newsEl.innerHTML = '<div class="tf-status">' + esc(e) + '</div>';
  });
})();
</script>
</body>
</html>
